# LiteLLM Python logging configuration
# Logs all requests to litellm/logs/requests.log (JSON, one entry per line)
# Passed to: litellm --log_config litellm/logging.conf
#
# Usage is automatic via start.sh — no manual action needed.

[loggers]
keys=root,litellm

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=simpleFormatter,jsonFormatter

[logger_root]
level=WARNING
handlers=consoleHandler

[logger_litellm]
level=INFO
handlers=consoleHandler,fileHandler
qualname=litellm
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=simpleFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=handlers.RotatingFileHandler
level=INFO
formatter=jsonFormatter
# Max 10 MB per file, keep 5 rotated files (~50 MB total history)
args=('litellm/logs/requests.log', 'a', 10485760, 5, 'utf-8')

[formatter_simpleFormatter]
format=%(asctime)s [%(levelname)s] %(message)s
datefmt=%Y-%m-%dT%H:%M:%S

[formatter_jsonFormatter]
class=litellm._logging.JsonFormatter
format=%(message)s
